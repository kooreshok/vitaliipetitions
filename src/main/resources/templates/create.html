<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Petition</title>
    <style>body { font-family: sans-serif; margin: 40px; } form { display: flex; flex-direction: column; width: 300px; gap: 10px; }</style>
</head>
<body>
    <h1>Create a New Petition</h1>
    <form th:action="@{/save}" th:object="${petition}" method="post">
        <label>Title:</label>
        <input type="text" th:field="*{title}" required>
        
        <label>Description:</label>
        <textarea th:field="*{description}" rows="5" required></textarea>
        
        <button type="submit" style="background: green; color: white; padding: 10px;">Create Petition</button>
    </form>
    <br>
    <a href="/">Cancel</a>
</body>
</html>
